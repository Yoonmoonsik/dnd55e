  <text x="70" y="62" font-family="Arial, Helvetica, sans-serif" font-size="16" font-weight="700" letter-spacing="5" fill="#c9a45c">D&amp;D 5.5e ALL-IN-ONE BEYOND</text>
  <text x="1210" y="62" text-anchor="end" font-family="Arial, Helvetica, sans-serif" font-size="16" font-weight="700" letter-spacing="3" fill="#8f88a3">08 / 08</text>
  <text x="70" y="148" font-family="Georgia, 'Times New Roman', serif" font-size="62" font-weight="700" fill="url(#goldGrad)">Spells</text>
  <text x="1210" y="128" text-anchor="end" font-family="Arial, Helvetica, sans-serif" font-size="80" font-weight="800" fill="url(#goldGrad)">67</text>
  <text x="1210" y="160" text-anchor="end" font-family="Arial, Helvetica, sans-serif" font-size="17" font-weight="600" fill="#9089a8">spells, all levels</text>
<text x="70" y="172" font-family="Arial, Helvetica, sans-serif" font-size="17" font-weight="600" fill="#9089a8">Cantrips through 6th level — new spells alongside 5.5e-revised classics.</text>
  <line x1="70" y1="195" x2="1210" y2="195" stroke="#e8b84b" stroke-opacity="0.35" stroke-width="1.5"/>
<text x="70" y="232" font-family="Arial, Helvetica, sans-serif" font-size="16" font-weight="700" letter-spacing="1" fill="#e8b84b">CANTRIPS · 17</text>
<line x1="70" y1="242" x2="600" y2="242" stroke="#4a4370" stroke-width="1"/>
<text x="70" y="266" font-family="Arial, Helvetica, sans-serif" font-size="14.5" fill="#cdc4e0">Blade Ward, Booming Blade, Bursting Sinew, Finger Guns, Frightful Start,</text>
<text x="70" y="288" font-family="Arial, Helvetica, sans-serif" font-size="14.5" fill="#cdc4e0">Green-Flame Blade, Hellfire, Holy Word, Mind Sliver, Sorcerous Burst,</text>
<text x="70" y="310" font-family="Arial, Helvetica, sans-serif" font-size="14.5" fill="#cdc4e0">Starry Wisp, Sword Burst, Thunderclap, Toll the Dead, True Strike,</text>
<text x="70" y="332" font-family="Arial, Helvetica, sans-serif" font-size="14.5" fill="#cdc4e0">Vengeful Blade, Word of Radiance.</text>
<text x="70" y="374" font-family="Arial, Helvetica, sans-serif" font-size="16" font-weight="700" letter-spacing="1" fill="#e8b84b">LEVEL 1 · 12</text>
<line x1="70" y1="384" x2="600" y2="384" stroke="#4a4370" stroke-width="1"/>
<text x="70" y="408" font-family="Arial, Helvetica, sans-serif" font-size="14.5" fill="#cdc4e0">Armor of Agathys, Chromatic Orb, Cloak of Shadow, Color Spray,</text>
<text x="70" y="430" font-family="Arial, Helvetica, sans-serif" font-size="14.5" fill="#cdc4e0">Cure Wounds, Divine Smite, False Life, Healing Word, Hell's Lash,</text>
<text x="70" y="452" font-family="Arial, Helvetica, sans-serif" font-size="14.5" fill="#cdc4e0">Spellfire Flare, Wardaway, Witch Bolt.</text>
<text x="70" y="494" font-family="Arial, Helvetica, sans-serif" font-size="16" font-weight="700" letter-spacing="1" fill="#e8b84b">LEVEL 2 · 18</text>
<line x1="70" y1="504" x2="600" y2="504" stroke="#4a4370" stroke-width="1"/>
<text x="70" y="528" font-family="Arial, Helvetica, sans-serif" font-size="14.5" fill="#cdc4e0">Aganazzar's Scorcher, Arcane Vigor, Darkbolt, Dazing Blast, Death Armor,</text>
<text x="70" y="550" font-family="Arial, Helvetica, sans-serif" font-size="14.5" fill="#cdc4e0">Elminster's Elusion, Find Steed, Fire Rune, Gust of Wind,</text>
<text x="70" y="572" font-family="Arial, Helvetica, sans-serif" font-size="14.5" fill="#cdc4e0">Lesser Restoration, Mind Spike, Prayer of Healing, Searing Orb,</text>
<text x="70" y="594" font-family="Arial, Helvetica, sans-serif" font-size="14.5" fill="#cdc4e0">Shadow Blade, Snilloc's Snowball Swarm, Summon Beast, Tasha's Mind Whip,</text>
<text x="70" y="616" font-family="Arial, Helvetica, sans-serif" font-size="14.5" fill="#cdc4e0">Warding Bond.</text>
<text x="670" y="232" font-family="Arial, Helvetica, sans-serif" font-size="16" font-weight="700" letter-spacing="1" fill="#e8b84b">LEVEL 3 · 11</text>
<line x1="670" y1="242" x2="1200" y2="242" stroke="#4a4370" stroke-width="1"/>
<text x="670" y="266" font-family="Arial, Helvetica, sans-serif" font-size="14.5" fill="#cdc4e0">Astral Flood, Aura of Vitality, Bestow Curse, Conjure Barrage,</text>
<text x="670" y="288" font-family="Arial, Helvetica, sans-serif" font-size="14.5" fill="#cdc4e0">Crusader's Mantle, Lightning Arrow, Murmurs of Doom, Summon Fey,</text>
<text x="670" y="310" font-family="Arial, Helvetica, sans-serif" font-size="14.5" fill="#cdc4e0">Tidal Wave, Trollblood Infusion, Void Strike.</text>
<text x="670" y="352" font-family="Arial, Helvetica, sans-serif" font-size="16" font-weight="700" letter-spacing="1" fill="#e8b84b">LEVEL 4 · 4</text>
<line x1="670" y1="362" x2="1200" y2="362" stroke="#4a4370" stroke-width="1"/>
<text x="670" y="386" font-family="Arial, Helvetica, sans-serif" font-size="14.5" fill="#cdc4e0">Fount of Moonlight, Murder of Crows, Spellfire Storm, Vitriolic Sphere.</text>
<text x="670" y="428" font-family="Arial, Helvetica, sans-serif" font-size="16" font-weight="700" letter-spacing="1" fill="#e8b84b">LEVEL 5 · 3</text>
<line x1="670" y1="438" x2="1200" y2="438" stroke="#4a4370" stroke-width="1"/>
<text x="670" y="462" font-family="Arial, Helvetica, sans-serif" font-size="14.5" fill="#cdc4e0">Cone of Cold, Steel Wind Strike, Synaptic Static.</text>
<text x="670" y="504" font-family="Arial, Helvetica, sans-serif" font-size="16" font-weight="700" letter-spacing="1" fill="#e8b84b">LEVEL 6 · 2</text>
<line x1="670" y1="514" x2="1200" y2="514" stroke="#4a4370" stroke-width="1"/>
<text x="670" y="538" font-family="Arial, Helvetica, sans-serif" font-size="14.5" fill="#cdc4e0">Circle of Death, Disintegrate.</text>

</svg>
